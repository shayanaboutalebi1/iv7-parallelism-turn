<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iV7 DEEPMESH // HACKING WARS SIMULATION</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  html,body{height:100%;background:#020508;font-family:'JetBrains Mono',monospace}
 .grid-bg{background-image:linear-gradient(rgba(0,229,255,0.08)1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.08)1px,transparent 1px);background-size:56px 56px;animation:gridMove 20s linear infinite}
  @keyframes gridMove{to{background-position:56px 56px,56px 56px}}
 .scanlines::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(to bottom,transparent 0 2px,rgba(0,229,255,0.04) 3px,transparent 4px);pointer-events:none;mix-blend-mode:screen}
 .timer{font-variant-numeric:tabular-nums;text-shadow:0 0 14px rgba(0,229,255,0.75),0 0 32px rgba(16,185,129,0.35)}
 .dot{animation:pulseDot 2.2s ease-in-out infinite;filter:drop-shadow(0 0 6px rgba(0,255,156,0.85))}
  @keyframes pulseDot{0%,100%{transform:scale(0.85);opacity:0.55}50%{transform:scale(1.3);opacity:1}}
 .live{animation:liveFlash 0.8s steps(2,end) infinite;text-shadow:0 0 18px rgba(16,185,129,0.95),0 0 40px rgba(16,185,129,0.65)}
  @keyframes liveFlash{0%,49%{opacity:1}50%,100%{opacity:0.35}}
</style>
</head>
<body class="text-cyan-100 flex items-center justify-center min-h-screen p-4">
<div class="relative w-[min(100vw,160vh)] h-[min(100vh,62.5vw)] aspect-[16/10] rounded-[2rem] border border-cyan-400/20 bg-gradient-to-b from-[#02040a] via-[#0a1422] to-[#02040a] overflow-hidden shadow-[0_0_120px_rgba(0,229,255,0.12)]">
  <div class="absolute inset-0 grid-bg opacity-60"></div>
  <div class="absolute inset-0 scanlines"></div>
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,transparent_60%,rgba(0,0,0,0.85)_100%)] pointer-events-none"></div>

  <!-- corners -->
  <div class="absolute top-4 left-4 w-14 h-14 border-l-2 border-t-2 border-cyan-400/70 rounded-tl-xl"></div>
  <div class="absolute top-4 right-4 w-14 h-14 border-r-2 border-t-2 border-cyan-400/70 rounded-tr-xl"></div>
  <div class="absolute bottom-4 left-4 w-14 h-14 border-l-2 border-b-2 border-emerald-400/60 rounded-bl-xl"></div>
  <div class="absolute bottom-4 right-4 w-14 h-14 border-r-2 border-b-2 border-emerald-400/60 rounded-br-xl"></div>

  <div class="relative z-10 h-full flex flex-col">
    <header class="pt-8 text-center px-6">
      <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-slate-900/70 border border-cyan-400/20 text-[11px] tracking-[0.35em] text-cyan-200">iV7 DEEPMESH // HACKING WARS SIMULATION</div>
      <h1 class="mt-4 text-2xl md:text-4xl font-bold tracking-wide text-cyan-50">Parallelism Turn - Live Initiation</h1>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center px-6 text-center">
      <div id="timerWrap" class="relative">
        <div id="timer" class="timer text-[clamp(3rem,11vw,8rem)] font-bold leading-none">02:00:00</div>
        <div class="mt-3 flex justify-center gap-8 text-xs tracking-[0.4em] text-cyan-200/70"><span>HOURS</span><span>MINUTES</span><span>SECONDS</span></div>
      </div>
      <div id="liveWrap" class="hidden flex-col items-center">
        <div class="live text-[clamp(2.5rem,9vw,7rem)] font-black tracking-wide text-emerald-300">SIMULATION LIVE</div>
        <p class="mt-4 text-sm tracking-[0.3em] text-emerald-200/80">ALL NODES ENGAGED</p>
      </div>

      <!-- 7x bridge -->
      <svg class="mt-10 w-[min(80vw,720px)] h-[70px]" viewBox="0 0 720 70">
        <line x1="40" y1="35" x2="680" y2="35" stroke="url(#g)" stroke-width="2" opacity="0.8"/>
        <defs><linearGradient id="g"><stop stop-color="#00e5ff"/><stop offset="1" stop-color="#10b981"/></linearGradient></defs>
        <g fill="rgba(0,255,156,0.08)" stroke="#00ff9c" stroke-width="2">
          <circle class="dot" cx="100" cy="35" r="9"/><circle class="dot" cx="200" cy="35" r="9" style="animation-delay:.2s"/><circle class="dot" cx="300" cy="35" r="9" style="animation-delay:.4s"/><circle class="dot" cx="400" cy="35" r="9" style="animation-delay:.6s"/><circle class="dot" cx="500" cy="35" r="9" style="animation-delay:.8s"/><circle class="dot" cx="600" cy="35" r="9" style="animation-delay:1s"/><circle class="dot" cx="680" cy="35" r="9" stroke="#00e5ff" style="animation-delay:1.2s"/>
        </g>
      </svg>
      <div class="mt-2 text-[11px] tracking-[0.4em] text-cyan-300">7× LAZY EYES BRIDGE</div>

      <!-- progress -->
      <div class="mt-8 w-full max-w-3xl h-[4px] bg-slate-800 rounded-full overflow-hidden border border-slate-700/60">
        <div id="progress" class="h-full w-0 bg-gradient-to-r from-cyan-400 via-emerald-400 to-cyan-400 transition-[width] duration-1000"></div>
      </div>
    </main>

    <footer class="pb-6 text-center text-[11px] tracking-wide text-slate-400">
      Shayan Aboutalebi • Agent-7727 • I AM RESPONSIBLE • Purely fictional satirical technical demonstration
    </footer>
  </div>
</div>

<script>
const TOTAL = 7200;
let remaining = TOTAL;
const timer = document.getElementById('timer');
const progress = document.getElementById('progress');
const timerWrap = document.getElementById('timerWrap');
const liveWrap = document.getElementById('liveWrap');
function fmt(n){return String(n).padStart(2,'0')}
function tick(){
  const h = Math.floor(remaining/3600), m = Math.floor((remaining%3600)/60), s = remaining%60;
  timer.textContent = `${fmt(h)}:${fmt(m)}:${fmt(s)}`;
  progress.style.width = ((TOTAL-remaining)/TOTAL*100).toFixed(2)+'%';
  if(remaining===0){clearInterval(iv);timerWrap.classList.add('hidden');liveWrap.classList.remove('hidden');liveWrap.classList.add('flex');return}
  remaining--;
}
tick();
const iv = setInterval(tick,1000);
</script>
</body>
</html>
